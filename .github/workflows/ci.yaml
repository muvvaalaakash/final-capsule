name: Build & Push to GHCR

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write   # REQUIRED for GHCR push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/final-capsule:latest \
                       -t ghcr.io/${{ github.repository }}/final-capsule:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository }}/final-capsule:latest
          docker push ghcr.io/${{ github.repository }}/final-capsule:${{ github.sha }}
          